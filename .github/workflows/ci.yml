name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke test
        run: python scripts/smoke_test.py

